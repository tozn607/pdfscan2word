name: Build Windows EXE & Upload to Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
    - name: Lấy mã nguồn về máy chủ
      uses: actions/checkout@v4

    - name: Cài đặt Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Trích xuất Phiên bản từ main.py
      id: extract_version
      run: |
        VERSION=$(python -c "import re; print(re.search(r'CURRENT_VERSION\s*=\s*[\"\'\']([^\"\'\']+)[\"\'\']', open('main.py', encoding='utf-8').read()).group(1))")
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
      shell: bash

    - name: Đóng gói thành file EXE bằng PyInstaller
      run: |
        pyinstaller --noconsole --windowed --onefile --collect-all customtkinter --name PDFScan2Word main.py

    - name: Nén file EXE thành ZIP
      run: |
        Compress-Archive -Path dist\PDFScan2Word.exe -DestinationPath PDFScan2Word-v${{ env.APP_VERSION }}-Windows.zip
      shell: powershell

    - name: Lưu file ZIP vào Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PDFScan2Word-v${{ env.APP_VERSION }}-Windows
        path: PDFScan2Word-v${{ env.APP_VERSION }}-Windows.zip
        
    - name: Đính kèm file ZIP Windows vào bài Release mới nhất
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Dùng GitHub CLI để hỏi xem cái tag của bài Release gần nhất tên là gì
        LATEST_TAG=$(gh release view --json tagName -q .tagName)
        echo "Đang upload vào Release: $LATEST_TAG"
        
        # Đẩy file ZIP lên bài Release đó (cờ --clobber giúp ghi đè nếu file đã tồn tại)
        gh release upload $LATEST_TAG PDFScan2Word-v${{ env.APP_VERSION }}-Windows.zip --clobber
      shell: bash