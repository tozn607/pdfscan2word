name: Build and Upload to Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: Windows
          - os: macos-15-intel
            suffix: macOS-x86_64
          - os: macos-15
            suffix: macOS-arm64
      fail-fast: false

    runs-on: ${{ matrix.os }}
    
    permissions:
      contents: write

    steps:
    - name: Lấy mã nguồn về máy chủ
      uses: actions/checkout@v4

    - name: Cài đặt Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Trích xuất Phiên bản từ main.py
      id: extract_version
      run: |
        VERSION=$(python -c "import re; print(re.search(r'CURRENT_VERSION\s*=\s*[\"\'\']([^\"\'\']+)[\"\'\']', open('main.py', encoding='utf-8').read()).group(1))")
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
      shell: bash

    - name: Đóng gói thành file chạy bằng PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconsole --onefile --name PDFScan2Word main.py
        
    - name: Đóng gói thành file chạy bằng PyInstaller (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconsole --windowed --name PDFScan2Word main.py
        
    - name: Nén thành ZIP (Windows)
      if: runner.os == 'Windows'
      run: |
        Compress-Archive -Path dist\PDFScan2Word.exe -DestinationPath PDFScan2Word-v${{ env.APP_VERSION }}-${{ matrix.suffix }}.zip
      shell: powershell

    - name: Nén thành ZIP (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r ../PDFScan2Word-v${{ env.APP_VERSION }}-${{ matrix.suffix }}.zip PDFScan2Word.app
      shell: bash

    - name: Lưu file ZIP vào Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PDFScan2Word-v${{ env.APP_VERSION }}-${{ matrix.suffix }}
        path: PDFScan2Word-v${{ env.APP_VERSION }}-${{ matrix.suffix }}.zip
        
    - name: Đính kèm file ZIP vào bài Release mới nhất
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LATEST_TAG=$(gh release view --json tagName -q .tagName)
        echo "Đang upload vào Release: $LATEST_TAG"
        
        gh release upload $LATEST_TAG PDFScan2Word-v${{ env.APP_VERSION }}-${{ matrix.suffix }}.zip --clobber
      shell: bash